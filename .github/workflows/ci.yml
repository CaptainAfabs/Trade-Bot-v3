name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend / python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import smoke test
        working-directory: backend
        run: |
          python -c "from app.main import app; print(f'routes: {len([r for r in app.routes if hasattr(r, \"path\")])}')"

      - name: Quant engine unit check
        working-directory: backend
        run: |
          python -c "
          from app.quant.scoring import _band_score
          assert _band_score(15, [(10, 90), (20, 70), (30, 50)], 'lower') == 70.0, 'band logic broken'
          assert _band_score(25, [(0, 10), (10, 50), (20, 80)], 'higher') == 80.0, 'higher band logic broken'
          assert _band_score(None, [(10, 90)], 'lower') is None, 'None should propagate'
          print('quant engine: OK')
          "

      - name: Profile model derivation
        working-directory: backend
        run: |
          python -c "
          from app.profiles.models import derive_position_limits
          assert derive_position_limits('high', 'short') == (40.0, 80.0), 'high/short should allow concentration'
          assert derive_position_limits('low', 'generational') == (4.0, 20.0), 'low/generational should spread thin'
          print('profile derivation: OK')
          "

  frontend:
    name: frontend / next.js build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check + build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
